# Starship + Matugen template
# High readability variant

add_newline = false

format = """
$cmd_duration $directory$git_branch$nix_shell
  $character"""

[fill]
symbol = '-'
style = 'fg:{{colors.outline.default.hex | lighten: 25.0}}'

[character]
success_symbol = "[ ](bold fg:{{colors.primary.default.hex | lighten: 35.0}})"
error_symbol = "[ ](bold fg:{{colors.error.default.hex | lighten: 20.0}})"

[package]
disabled = true

[git_branch]
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = " [](bold fg:{{colors.secondary_container.default.hex | lighten: 10.0}})[$symbol $branch(:$remote_branch)](bold fg:{{colors.on_secondary_container.default.hex | lighten: 25.0}} bg:{{colors.secondary_container.default.hex | lighten: 10.0}})[ ](bold fg:{{colors.secondary_container.default.hex | lighten: 10.0}})"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)](bold fg:{{colors.error.default.hex | lighten: 15.0}}) '
cherry_pick = "[🍒 PICKING](bold fg:{{colors.error.default.hex | lighten: 20.0}})"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 "
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](bold fg:{{colors.primary.default.hex | lighten: 30.0}})'
renamed = " ✍️ "
deleted = " 🗑 "

[nix_shell]
disabled = false
symbol = "󱄅"
impure_msg = "impure"
pure_msg = "pure"
unknown_msg = "shell"
format = ' [](bold fg:{{colors.tertiary_container.default.hex | lighten: 10.0}})[$symbol $state( \($name\))](bold bg:{{colors.tertiary_container.default.hex | lighten: 10.0}} fg:{{colors.on_tertiary_container.default.hex | lighten: 25.0}})[](bold fg:{{colors.tertiary_container.default.hex | lighten: 10.0}})'

[hostname]
ssh_only = false
format = "[•$hostname](bold bg:{{colors.secondary_container.default.hex | lighten: 10.0}} fg:{{colors.on_secondary_container.default.hex | lighten: 25.0}})[](bold fg:{{colors.secondary_container.default.hex | lighten: 10.0}})"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold fg:{{colors.primary.default.hex | lighten: 25.0}}"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:{{colors.secondary_container.default.hex | lighten: 10.0}} fg:{{colors.on_secondary_container.default.hex | lighten: 30.0}}"
style_root = "bold fg:{{colors.error.default.hex | lighten: 20.0}}"
format = "[](bold fg:{{colors.secondary_container.default.hex | lighten: 10.0}})[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " "
read_only = "  "
style = "bold bg:{{colors.surface_container_high.default.hex | lighten: 8.0}} fg:{{colors.on_surface.default.hex | lighten: 20.0}}"
truncation_length = 2
truncation_symbol = ".../"
format = '[](bold fg:{{colors.surface_container_high.default.hex | lighten: 8.0}})[󰉋 → $path]($style)[](bold fg:{{colors.surface_container_high.default.hex | lighten: 8.0}})'

[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '[](bold fg:{{colors.primary_container.default.hex | lighten: 10.0}})[󰪢 $duration](bold bg:{{colors.primary_container.default.hex | lighten: 10.0}} fg:{{colors.on_primary_container.default.hex | lighten: 30.0}})[](bold fg:{{colors.primary_container.default.hex | lighten: 10.0}})'
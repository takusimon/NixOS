# Starship + Matugen template
# Adjusted ONLY to better match the kitty palette

add_newline = false

format = """
$time $cmd_duration $directory $git_branch $nix_shell

 $username $character"""

[fill]
symbol = '-'
style = 'fg:{{colors.outline.default.hex}}'

[character]
success_symbol = "[о©± пБЛ](bold fg:{{colors.primary.default.hex}})"
error_symbol = "[пАН пБЛ](bold fg:{{colors.error.default.hex}})"

[package]
disabled = true

[git_branch]
symbol = "у∞Шђ"
truncation_length = 12
truncation_symbol = ""
format = " [оВґ](bold fg:{{colors.secondary_container.default.hex}})[$symbol $branch(:$remote_branch)](bold fg:{{colors.on_secondary_container.default.hex}} bg:{{colors.secondary_container.default.hex}})[оВі ](bold fg:{{colors.secondary_container.default.hex}})"

[git_commit]
commit_hash_length = 4
tag_symbol = "пТґ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)](bold fg:{{colors.error.default.hex}}) '
cherry_pick = "[рЯНТ PICKING](bold fg:{{colors.error.default.hex}})"

[git_status]
conflicted = " рЯП≥ "
ahead = " рЯПОрЯТ® "
behind = " рЯШ∞ "
diverged = " рЯШµ "
untracked = " рЯ§Ј "
stashed = " рЯУ¶ "
modified = " рЯУЭ "
staged = '[++\($count\)](bold fg:{{colors.primary.default.hex}})'
renamed = " вЬНпЄП "
deleted = " рЯЧС "

[nix_shell]
disabled = false
symbol = "у±ДЕ"
impure_msg = "impure"
pure_msg = "pure"
unknown_msg = "shell"

format = ' [оВґ](bold fg:{{colors.primary_container.default.hex}})[$symbol $state( \($name\))](bold bg:{{colors.primary_container.default.hex}} fg:{{colors.on_primary_container.default.hex}})[оВі](bold fg:{{colors.primary_container.default.hex}})'

[hostname]
ssh_only = false
format = "[вАҐ$hostname](bold bg:{{colors.secondary_container.default.hex}} fg:{{colors.on_secondary_container.default.hex}})[оВі](bold fg:{{colors.secondary_container.default.hex}})"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold fg:{{colors.primary.default.hex}}"

[time]
disabled = false
format = '[оВґ](bold fg:{{colors.on_primary_container.default.hex}})[у∞Г≠ $time](bold bg:{{colors.on_primary_container.default.hex}} fg:{{colors.background.default.hex}})[оВі](bold fg:{{colors.on_primary_container.default.hex}})'
time_format = "%Y-%m-%d %H:%M"

[username]
style_user = "bold bg:{{colors.secondary_container.default.hex}} fg:{{colors.on_secondary_container.default.hex}}"
style_root = "bold fg:{{colors.error.default.hex}}"
format = '[оВґ](bold fg:{{colors.on_primary_container.default.hex}})[пАЗ $username](bold bg:{{colors.on_primary_container.default.hex}} fg:{{colors.background.default.hex}})[оВі](bold fg:{{colors.on_primary_container.default.hex}})'
disabled = false
show_always = true

[directory]
home_symbol = "пС≠ "
read_only = " пСЦ "
style = "bold bg:{{colors.surface_container.default.hex}} fg:{{colors.on_surface.default.hex}}"
truncation_length = 2
truncation_symbol = ".../"
format = '[оВґ](bold fg:{{colors.surface_container.default.hex}})[у∞ЙЛ вЖТ $path]($style)[оВі](bold fg:{{colors.surface_container.default.hex}})'

[directory.substitutions]
"Desktop" = " пТ© "
"Documents" = " пТ• "
"Downloads" = " пРЙ "
"Music" = " у∞ОИ "
"Pictures" = " пРП "
"Videos" = " пФђ "
"GitHub" = " у∞К§ "

[cmd_duration]
min_time = 0
format = '[оВґ](bold fg:{{colors.primary_container.default.hex}})[у∞™Ґ $duration](bold bg:{{colors.primary_container.default.hex}} fg:{{colors.on_primary_container.default.hex}})[оВі](bold fg:{{colors.primary_container.default.hex}})'